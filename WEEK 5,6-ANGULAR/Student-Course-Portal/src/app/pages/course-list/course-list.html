<section class="course-list">
  <h2>Available Courses</h2>

  <!-- Search input box for dynamic filtering -->
  <div class="search-filter-container" style="margin-bottom: 24px;">
    <input
      type="text"
      [(ngModel)]="searchTerm"
      (ngModelChange)="onSearchChange()"
      placeholder="Search courses by name or code..."
      style="padding: 10px 14px; width: 100%; max-width: 400px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 1rem; box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);"
    />
  </div>

  <!-- Error message display (Step 84) -->
  <div *ngIf="errorMessage$ | async as errorMessage" class="error-banner" style="background-color: #fef2f2; color: #991b1b; padding: 12px 16px; border-radius: 8px; border: 1px solid #fee2e2; margin-bottom: 20px; font-weight: 500;">
    {{ errorMessage }}
  </div>

  <!-- HANDS-ON 3 - Task 1, Step 25: *ngIf / else loading indicator -->
  <p *ngIf="isLoading$ | async; else courseGrid">Loading courses...</p>

  <ng-template #courseGrid>
    <!-- Filtered courses display (Step 96 async pipe) -->
    <ng-container *ngIf="filteredCourses$ | async as filteredCourses">
      <div *ngIf="filteredCourses.length > 0; else noCourses">
        <app-course-card
          *ngFor="let course of filteredCourses; let i = index; trackBy: trackByCourseId"
          [course]="course"
          (enrollRequested)="onEnroll($event)"
          (viewDetails)="onViewDetails($event)"
        ></app-course-card>
      </div>
    </ng-container>
    <ng-template #noCourses>
      <p>No matching courses found.</p>
    </ng-template>
  </ng-template>

  <p *ngIf="selectedCourseId" class="selected">
    Selected course ID: {{ selectedCourseId }}
  </p>
</section>
